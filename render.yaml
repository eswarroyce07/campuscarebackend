services:
  - type: web
    name: backendcc
    runtime: node
    buildCommand: npm install
    startCommand: node Server.js
    envVars:
      - key: MONGO_url
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
